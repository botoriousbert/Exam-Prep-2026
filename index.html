  {u:6,t:"83(b) Election",q:"83(b) election — what it does, key rules, and risks",a:'<strong>What it does:</strong> Pay ordinary income tax at GRANT (not vesting). All future appreciation = LTCG.<br><br><strong>Rules:</strong> File within 30 days of grant. Irrevocable.<br><br><strong>Risks:</strong> Forfeiture = taxes not refunded. Stock decline = overpaid. No liquidity at grant to cover tax bill.'},
  {u:6,t:"RSUs/PSUs",q:"Why can RSUs never qualify for an 83(b) election?",a:'The 83(b) election requires property to have been <strong>actually transferred</strong>. RSUs are merely a promise to deliver shares in the future — no property transfers at grant. The election is legally unavailable for RSUs.'},
  {u:6,t:"ISOs",q:"ISO qualifying vs. non-qualifying disposition",a:'<strong>Qualifying:</strong> 2+ years from grant AND 1+ year from exercise → All gain = LTCG, no ordinary income.<br><br><strong>Non-qualifying:</strong> Spread at exercise (FMV − strike) = ordinary income. Additional gain = capital gain (often short-term).<br><div class="tip">MEMORY: 2-year grant / 1-year exercise = qualifying = LTCG</div>'},
  {u:6,t:"ISOs",q:"ISO AMT — how it works and the AMT credit",a:'At exercise: bargain element (FMV at exercise − strike price) added to AMT income. AMT may be owed with no cash received.<br><br>AMT credit generated → offsets future regular tax in non-AMT years.<br><div class="tip">Heads I Win, Tails You Lose: Exercise early in year → if stock falls, sell before Dec 31 to avoid AMT; if rises, hold for LTCG</div>'},
  {u:6,t:"NQSOs",q:"NQSO tax treatment vs. ISOs",a:'<strong>NQSO at exercise:</strong> Ordinary income (FMV − strike) = W-2 income, FICA + Medicare taxable. NO AMT risk.<br><br><strong>ISO at exercise:</strong> No regular income tax, but bargain element = AMT preference item.<br><br>After exercise, both have LTCG clock starting at exercise date.'},
  {u:6,t:"NQDC",q:"NQDC 10-year state tax rule",a:'Normally: state where income was EARNED at deferral can tax distributions — even if client moved.<br><br><strong>Exception:</strong> Distributions paid over 10+ years → only state of RESIDENCE at distribution can tax.<br><div class="tip">Classic: Defer in CA, retire to TX, structure 10+ year distributions = zero CA state tax</div>'},
  {u:6,t:"NQDC",q:"Section 409A penalties and distribution rules",a:'<strong>Delay rule:</strong> Request must be made 1 year before original date; new date must be 5+ years later.<br><br><strong>409A violations:</strong> ALL deferred compensation immediately taxable + 20% penalty + interest.<br><br><strong>Permissible triggers:</strong> Separation from service, disability, death, unforeseeable emergency, change in control, specified date.'},
];

    {k:"Asset Location — Tax-Free (Roth/HSA)",v:"High-growth stocks, small-cap, emerging markets, REITs. Primary criteria: high expected future returns."},
    {k:"Net Method vs. Gross Method",v:"Net: considers after-tax value of each dollar (adjusts for future tax liability on pre-tax accounts). More accurate, complex. Gross: treats all balances equally. Simple, less precise."},
    {k:"Traditional-Roth Equivalency",v:"Identical tax rates at contribution and withdrawal = identical after-tax outcomes. Choose Roth if rates rise; Traditional if rates fall."},

  {u:"Unit 4",t:"Education Planning",rows:[
    {k:"AOTC vs. LLC",v:"AOTC: $2,500/yr × first 4 years; 40% refundable (max $1,000); half-time enrollment required; max qualifying expenses = $4,000. LLC: $2,000/yr; non-refundable; any year; no half-time requirement."},
    {k:"Scholarship + AOTC Strategy",v:"Intentionally treat $4,000 of scholarship as taxable income → can claim full $2,500 AOTC. The credit value typically exceeds the tax on $4,000 for low-bracket students."},

    {k:"IRA Distributions for Education",v:"Penalty-free for qualified higher education expenses. Still subject to ordinary income tax — NOT tax-free like a 529."},
    {k:"Series EE/I Bonds Education Exclusion",v:"Requirements: qualified higher education expenses, below income limits, bondholder at least 24 years old at issuance. Does NOT need to be held to maturity."},
  ],tip:"EXAM TIP: Roth IRA balance ≠ counted on FAFSA. Roth IRA distributions = DO count as FAFSA income. 529 = parental asset (5.64%). UTMA = student asset (20%). These distinctions are frequently tested."},
  {u:"Unit 5",t:"Small Business Tax",rows:[
    {k:"S-Corp Requirements",v:"≤100 shareholders · individuals/certain trusts/estates only · US citizens/residents only · one class of stock · no nonresident alien shareholders. ANY violation = automatic termination."},
    {k:"QBI Low-Income Formula",v:"20% × lesser of: (1) combined QBI, or (2) taxable income minus net capital gains. Below phaseout: SSTB status, W-2 wages, property irrelevant."},
    {k:"QBI Non-SSTB Wage/Property Limit",v:"Deduction = GREATER of: 50% of W-2 wages OR (25% of W-2 wages + 2.5% of UBIA). No wages + no property = zero QBI above phaseout."},
    {k:"SSTB High-Income Strategy",v:"Above phaseout: deduction eliminated. W-2/property tests don't help SSTBs. Only path: reduce taxable income via retirement plans (DB plans), charitable deductions, working fewer hours."},

    {k:"PTET",v:"Entity pays state income tax → federally deductible (bypasses $10K SALT cap). Partners/shareholders get state credit. May not be beneficial if admin costs exceed tax savings."},
    {k:"QSBS Section 1202",v:"100% gain exclusion: acquired after 9/27/2017, held 5+ years, from issuing C-corp (not secondary market). Limit: greater of $10M or 10× adjusted basis. <$50M gross assets ($75M after 2025)."},
    {k:"Home Office — Simplified Method",v:"$5/sq ft × up to 300 sq ft = max $1,500. Flat rate, NOT percentage of business use. No depreciation. Cannot create NOL."},

  ],tip:"EXAM TIP: QBI is a below-the-line deduction available whether you take standard OR itemized deduction. It does NOT reduce AGI. It is phased out based on TAXABLE INCOME (not AGI) — so both above-the-line AND below-the-line deductions can help reduce it."},
  {u:"Unit 6",t:"Corporate Executive Compensation",rows:[
    {k:"83(b) Eligible: Restricted Stock ONLY",v:"RSAs (Restricted Stock Awards) = actual shares transferred at grant → 83(b) available. RSUs and PSUs = promises to deliver shares in the future → NO property transferred at grant → 83(b) NOT available."},
    {k:"Restricted Stock Tax Timeline",v:"Grant date: NO tax (substantial risk of forfeiture). Vesting date: ordinary income = FMV at vesting. Basis = FMV at vesting. LTCG holding period starts at vesting. Withholding: 22% on first $1M / 37% above $1M."},
    {k:"83(b) Election — What It Does",v:"File within 30 days of grant (hard deadline, no exceptions). Pay ordinary income tax on FMV at GRANT (not vesting). All future appreciation = LTCG. At vesting: NO additional tax. Irrevocable once made."},
    {k:"83(b) Election — When to Use",v:"Best when: low FMV at grant (startup equity), confident of meeting vesting, expects significant appreciation. Risks: forfeiture = taxes not refunded; stock decline = overpaid; no liquidity at grant to cover tax bill."},
    {k:"RSUs vs. Restricted Stock",v:"RSUs = cash bonus equivalent at vesting (ordinary income + employment taxes). Vested ≠ Delivered (especially in private companies with double-trigger RSUs). 83(b) cannot be made on RSUs."},

    {k:"NQDC — Key Features",v:"Unlimited contribution limits (no IRS cap). NOT protected by ERISA. Flexible — can be selectively offered to executives. Assets remain company property (creditor risk in bankruptcy). NOT tax-free at withdrawal (ordinary income)."},

    {k:"NQDC — 10-Year State Tax Rule",v:"Normally: state where income was EARNED at deferral can tax distributions even if client moved. Exception: if distributions paid over 10+ years, only the state of RESIDENCE at distribution can tax. Distributions are still subject to state tax — just potentially in a more favorable state."},
    {k:"NQDC vs. 401(k) Key Differences",v:"NQDC: no contribution limits, no ERISA protection, no rollover, creditor risk, distribution election at plan establishment. 401(k): IRS contribution limits, ERISA protected, can rollover, creditor protected, flexible post-retirement withdrawals."},
  ],tip:"EXAM TIP — Unit 6 most-tested distinctions: (1) 83(b) available for Restricted Stock ONLY, not RSUs/PSUs. (2) ISO exercise = no regular tax but AMT risk. NQSO exercise = immediate ordinary income, no AMT. (3) NQDC distribution election must be made when plan is established — irrevocable. (4) 'Vested' and 'delivered' are NOT synonymous for RSUs."},
];

let quizState = {qs:[],cur:0,score:0,answered:false,uScores:{}};
let fcFiltered = [...CARDS], fcIdx = 0;

function showTab(id, btn) {
  ['quiz','cards','sheet'].forEach(t => document.getElementById('panel-'+t).classList.toggle('active', t===id));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function startQuiz() {
  const unit = document.getElementById('q-unit').value;
  let pool = unit === 'all' ? [...QS] : QS.filter(q=>q.u===parseInt(unit));
  pool = pool.sort(()=>Math.random()-0.5);
  quizState = {qs:pool, cur:0, score:0, answered:false, uScores:{}};
  document.getElementById('quiz-setup').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  renderQ();
}

function renderQ() {
  const area = document.getElementById('quiz-area');
  const s = quizState;
  if(s.cur >= s.qs.length) { renderResult(); return; }
  const q = s.qs[s.cur];
  const isMulti = Array.isArray(q.c);
  area.innerHTML = `
    <div class="quiz-meta">
      <span class="quiz-unit-badge">Unit ${q.u}</span>
      <span class="quiz-score-badge">${s.cur+1}/${s.qs.length} &nbsp;|&nbsp; Score: ${s.score}/${s.cur}</span>
    </div>
    <div class="progress"><div class="progress-fill" style="width:${Math.round(s.cur/s.qs.length*100)}%"></div></div>
    <div class="qcard">
      <div class="qnum">Question ${s.cur+1}${isMulti ? ' — select all that apply' : ''}</div>
      <div class="qtext">${q.q}</div>
      <div class="opts">${q.opts.map((o,i)=>`<button class="opt" id="opt${i}" onclick="answerQ(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>
      <div class="explain" id="exp">${q.ex}</div>
    </div>
    <div class="quiz-nav"><button id="nextbtn" onclick="nextQ()" style="display:none">Next Question →</button></div>
  `;
}

function answerQ(idx) {
  if(quizState.answered) return;
  quizState.answered = true;
  const q = quizState.qs[quizState.cur];
  const isMulti = Array.isArray(q.c);
  const correct = isMulti ? q.c.includes(idx) : idx === q.c;
  if(correct) quizState.score++;
  const u = 'Unit '+q.u;
  if(!quizState.uScores[u]) quizState.uScores[u]={r:0,t:0};
  quizState.uScores[u].t++;
  if(correct) quizState.uScores[u].r++;
  q.opts.forEach((_,i) => {
    const b = document.getElementById('opt'+i);
    if(!b) return;
    b.disabled = true;
    const isC = isMulti ? q.c.includes(i) : i===q.c;
    if(isC) b.classList.add('reveal');
    else if(i===idx && !correct) b.classList.add('wrong');
  });
  document.getElementById('exp').classList.add('show');
  document.getElementById('nextbtn').style.display='block';
}

function nextQ() { quizState.cur++; quizState.answered=false; renderQ(); }

function renderResult() {
  const s = quizState;
  const pct = s.qs.length > 0 ? Math.round(s.score/s.qs.length*100) : 0;
  const msg = pct>=90?'Excellent!':pct>=75?'Solid work.':pct>=60?'Keep studying.':'Review and retry.';
  const unitRows = Object.entries(s.uScores).map(([u,d])=>{
    const p=Math.round(d.r/d.t*100);
    const c=p>=80?'#3B6D11':p>=60?'#BA7517':'#A32D2D';
    return `<div class="unit-row"><span class="unit-row-name">${u}</span><span class="unit-row-val" style="color:${c}">${d.r}/${d.t} (${p}%)</span></div>`;
  }).join('');
  document.getElementById('quiz-area').innerHTML = `
    <div class="result-wrap">
      <div class="result-pct">${pct}%</div>
      <div class="result-label">${s.score} / ${s.qs.length} correct — ${msg}</div>
      <div class="result-grid">
        <div class="rcard"><div class="rcard-label">Correct</div><div class="rcard-val">${s.score}</div></div>
        <div class="rcard"><div class="rcard-label">Incorrect</div><div class="rcard-val">${s.qs.length-s.score}</div></div>
      </div>
      <div class="unit-rows"><div class="unit-rows-title">Performance by Unit</div>${unitRows}</div>
      <button class="btn-retry" onclick="document.getElementById('quiz-setup').style.display='block';document.getElementById('quiz-area').style.display='none'">New Quiz ↩</button>
    </div>
  `;
}

function filterCards() {
  const val = document.getElementById('fc-unit').value;
  fcFiltered = val==='all' ? [...CARDS] : CARDS.filter(c=>c.u===parseInt(val));
  fcIdx=0; renderCard();
}

function renderCard() {
  const c = fcFiltered[fcIdx];
  document.getElementById('fc-tag').textContent = `Unit ${c.u} · ${c.t}`;
  document.getElementById('fc-q').textContent = c.q;
  document.getElementById('fc-a').innerHTML = c.a;
  document.getElementById('fc-counter').textContent = `${fcIdx+1}/${fcFiltered.length}`;
  document.getElementById('fc-prog').style.width = Math.round((fcIdx+1)/fcFiltered.length*100)+'%';
  document.getElementById('fc-card').classList.remove('flipped');
}

function flipCard() { document.getElementById('fc-card').classList.toggle('flipped'); }
function fcNext() { fcIdx=(fcIdx+1)%fcFiltered.length; renderCard(); }
function fcPrev() { fcIdx=(fcIdx-1+fcFiltered.length)%fcFiltered.length; renderCard(); }
function fcShuffle() {
  for(let i=fcFiltered.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[fcFiltered[i],fcFiltered[j]]=[fcFiltered[j],fcFiltered[i]];}
  fcIdx=0; renderCard();
}

function buildSheet() {
  document.getElementById('sheet-area').innerHTML = SHEET.map((s,i)=>`
    <div class="cs-section">
      <div class="cs-hdr" id="csh${i}" onclick="toggleCS(${i})">
        <span class="cs-hdr-unit">${s.u}</span>
        <span class="cs-hdr-title">${s.t}</span>
        <span class="cs-hdr-chev">▼</span>
      </div>
      <div class="cs-body" id="csb${i}">
        ${s.rows.map(r=>`<div class="cs-row"><div class="cs-key">${r.k}</div><div class="cs-val">${r.v}</div></div>`).join('')}
        ${s.tip?`<div class="cs-tip">${s.tip}</div>`:''}
      </div>
    </div>
  `).join('');
}

function toggleCS(i) {
  document.getElementById('csb'+i).classList.toggle('open');
  document.getElementById('csh'+i).classList.toggle('open');
}

renderCard();
buildSheet();
</script>
